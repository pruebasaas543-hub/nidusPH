<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ servicio.nombre }} — arIAna</title>
    <style>
    html { zoom: 0.8; }
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Outfit','Segoe UI',sans-serif; }
        body { background:#080e2e; color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .coming-soon {
            text-align:center;
            padding:60px 40px;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(0,212,255,.2);
            border-radius:24px;
            max-width:520px;
            width:90%;
        }
        .icon { font-size:3.5rem; margin-bottom:20px; }
        h1 { font-size:2rem; font-weight:700; margin-bottom:10px; }
        h1 span { color:#00d4ff; }
        p { color:rgba(255,255,255,.5); font-size:.95rem; line-height:1.6; }
        .badge {
            display:inline-block; margin-top:24px;
            padding:6px 18px; border-radius:20px;
            background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3);
            color:#00d4ff; font-size:.78rem; font-weight:600; letter-spacing:1px;
        }
        a.back {
            display:inline-flex; align-items:center; gap:8px; margin-top:30px;
            color:rgba(255,255,255,.4); font-size:.82rem; text-decoration:none;
            transition:color .2s;
        }
        a.back:hover { color:#00d4ff; }
    </style>
</head>
<body>
    <div class="coming-soon">
        <div class="icon">{{ servicio.icono or '📋' }}</div>
        <h1><span>{{ servicio.nombre }}</span></h1>
        <p>{{ servicio.descripcion or 'Este módulo está en construcción. Próximamente disponible.' }}</p>
        <div class="badge">EN DESARROLLO</div><br>
        <a class="back" href="javascript:history.back()">← Volver</a>
    </div>
</body>
</html>
