<!DOCTYPE html>
<html lang="es" data-tema="{{ tema_clave }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪪 Control de Acceso — Residente</title>
<style id="nidus-tema">{{ tema_css | safe }}</style>
{% if tema_vars %}<style id="nidus-vars">{{ tema_vars | safe }}</style>{% endif %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit','Segoe UI',sans-serif;}
:root{--bg:#EEF2FF;--bg2:#FFFFFF;--bg3:#D8E4F5;--accent:#2787F5;--accent2:#1a6de0;--text:#1E2756;--muted:#8A9CC8;--border:rgba(39,135,245,.18);--red:#e53e3e;--green:#276749;--orange:#b7791f;}
html,body{height:100%;}body{background:var(--bg);color:var(--text);}
.ca-page{max-width:1000px;margin:0 auto;padding:20px;}
.ca-top{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,#042243,#0a4a8c);color:#fff;border-radius:14px;padding:14px 20px;margin-bottom:18px;}
.ca-top .ic{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.ca-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:820px){.ca-grid{grid-template-columns:1fr;}}
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:18px;}
.card-title{font-size:.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:5px;}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.88rem;outline:none;color:var(--text);background:var(--bg2);font-family:inherit;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:11px 16px;border-radius:11px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;font-family:inherit;}
.btn-pri{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;width:100%;}
.btn-del{background:rgba(229,62,62,.1);border:1px solid rgba(229,62,62,.25);color:var(--red);font-size:.74rem;padding:5px 10px;border-radius:8px;}
.dias{display:flex;gap:5px;flex-wrap:wrap;}
.dia{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:700;user-select:none;}
.dia.on{background:color-mix(in srgb,var(--accent) 15%,transparent);border-color:var(--accent);color:var(--accent);}
.cred{border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;background:var(--bg);}
.codigo{font-size:1.5rem;font-weight:800;letter-spacing:6px;color:var(--accent);background:var(--bg2);border:2px dashed var(--accent);border-radius:10px;padding:10px;text-align:center;margin:8px 0;}
.hint{font-size:.74rem;color:var(--muted);}
.pin-box{background:rgba(229,62,62,.05);border:1.5px solid rgba(229,62,62,.25);border-radius:12px;padding:16px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#042243;color:#fff;padding:11px 22px;border-radius:10px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="ca-page">
  <div class="ca-grid">
    <!-- Crear invitación -->
    <div>
      <div class="card">
        <div class="card-title">➕ Nueva invitación</div>
        <div class="field"><label>Nombre del visitante *</label><input id="v-nombre" autocomplete="off"></div>
        <div class="row2">
          <div class="field"><label>Documento</label><input id="v-doc" autocomplete="off"></div>
          <div class="field"><label>Placa vehículo (opcional)</label><input id="v-placa" autocomplete="off"></div>
        </div>
        <div class="field"><label>Tipo de credencial</label>
          <select id="v-tipo" onchange="toggleRecurrencia()">
            <option value="unico">Único (una visita)</option>
            <option value="recurrente">Recurrente (frecuente: empleada, paseador…)</option>
            <option value="proveedor">Proveedor</option>
          </select>
        </div>
        <div id="recurrencia" style="display:none;">
          <div class="field"><label>Días permitidos</label>
            <div class="dias" id="dias">
              <div class="dia" data-d="1">Lun</div><div class="dia" data-d="2">Mar</div>
              <div class="dia" data-d="3">Mié</div><div class="dia" data-d="4">Jue</div>
              <div class="dia" data-d="5">Vie</div><div class="dia" data-d="6">Sáb</div>
              <div class="dia" data-d="7">Dom</div>
            </div>
          </div>
          <div class="row2">
            <div class="field"><label>Hora inicio</label><input type="time" id="v-hini" value="08:00"></div>
            <div class="field"><label>Hora fin</label><input type="time" id="v-hfin" value="18:00"></div>
          </div>
        </div>
        <div class="field"><label>Vigencia hasta (opcional)</label><input type="date" id="v-fin"></div>
        <button class="btn btn-pri" onclick="crear()">🎟️ Generar credencial</button>
        <div id="creado" style="margin-top:14px;"></div>
      </div>
    </div>

    <!-- Mis credenciales + PIN coacción -->
    <div>
      <div class="card pin-box">
        <div class="card-title" style="color:var(--red);">🆘 PIN de coacción (acceso bajo amenaza)</div>
        <div class="hint" style="margin-bottom:10px;">Si lo digitas en portería, el sistema mostrará "Acceso Autorizado" pero <b>alertará en silencio a seguridad</b>. Úsalo solo en emergencia real.</div>
        <div class="row2">
          <div class="field" style="margin-bottom:0;"><input id="pin" type="password" placeholder="PIN (mín. 4)" autocomplete="off"></div>
          <button class="btn btn-pri" style="width:auto;" onclick="guardarPin()">Guardar PIN</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎟️ Mis credenciales activas</div>
        <div id="lista"><div class="hint">Cargando…</div></div>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const API='/servicios/control_acceso';
const $=id=>document.getElementById(id);
const EID=new URLSearchParams(location.search).get('empresa_id')||'';
const Q=EID?('&empresa_id='+encodeURIComponent(EID)):'';
function toast(m){const t=$('toast');t.textContent=m;t.className='toast show';setTimeout(()=>t.className='toast',2500);}
function toggleRecurrencia(){ $('recurrencia').style.display = $('v-tipo').value==='recurrente' ? 'block':'none'; }
document.querySelectorAll('#dias .dia').forEach(d=>d.onclick=()=>d.classList.toggle('on'));

async function crear(){
  const nombre=$('v-nombre').value.trim();
  if(!nombre){ toast('El nombre es obligatorio'); return; }
  const tipo=$('v-tipo').value;
  const body={ visitante:{nombre, documento:$('v-doc').value.trim(),
                 vehiculo:$('v-placa').value.trim()?{tiene_vehiculo:true,placa:$('v-placa').value.trim().toUpperCase()}:{tiene_vehiculo:false}},
               tipo_credencial:tipo, metodo_autenticacion:'QR' };
  if(tipo==='recurrente'){
    const dias=[...document.querySelectorAll('#dias .dia.on')].map(d=>parseInt(d.dataset.d));
    body.configuracion_recurrencia={dias_permitidos:dias,hora_inicio:$('v-hini').value,hora_fin:$('v-hfin').value};
  }
  if($('v-fin').value) body.vigencia={fin:$('v-fin').value+'T23:59:59'};
  body.empresa_id=EID;
  try{
    const r=await fetch(`${API}/credenciales`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(!j.ok){ toast('Error: '+(j.error||'')); return; }
    $('creado').innerHTML=`<div class="hint" style="color:var(--green);font-weight:700;">✅ Credencial generada — comparte este código:</div>
      <div class="codigo">${j.data.codigo}</div>
      <div class="hint">Sirve como QR (genéralo con este texto) o como PIN de 6 dígitos en portería.</div>`;
    $('v-nombre').value='';$('v-doc').value='';$('v-placa').value='';$('v-fin').value='';
    cargar();
  }catch{ toast('Error de conexión'); }
}

async function guardarPin(){
  const pin=$('pin').value.trim();
  if(pin.length<4){ toast('El PIN debe tener mínimo 4 caracteres'); return; }
  try{
    const r=await fetch(`${API}/mi-pin-coaccion`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
    const j=await r.json();
    toast(j.ok?'✅ PIN de coacción guardado':('Error: '+(j.error||'')));
    if(j.ok) $('pin').value='';
  }catch{ toast('Error de conexión'); }
}

async function cargar(){
  try{
    const r=await fetch(`${API}/credenciales?_t=${Date.now()}${Q}`); const j=await r.json();
    if(!j.ok) return;
    const list=(j.data||[]).filter(c=>c.estado==='activo');
    if(!list.length){ $('lista').innerHTML='<div class="hint">No tienes credenciales activas.</div>'; return; }
    const tipoLbl={unico:'Único',recurrente:'Recurrente',proveedor:'Proveedor'};
    $('lista').innerHTML=list.map(c=>{
      const v=c.visitante||{};
      const rec=c.configuracion_recurrencia&&c.configuracion_recurrencia.hora_inicio
        ? `<div class="hint">⏰ ${c.configuracion_recurrencia.hora_inicio}–${c.configuracion_recurrencia.hora_fin}</div>`:'';
      return `<div class="cred">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;"><div style="font-weight:700;">${v.nombre||'—'}</div>
          <div class="hint">${tipoLbl[c.tipo_credencial]||c.tipo_credencial}${v.documento?(' · '+v.documento):''}</div>${rec}</div>
          <button class="btn-del" onclick="revocar('${c._id}')">Revocar</button>
        </div>
        <div class="codigo" style="font-size:1.2rem;letter-spacing:4px;margin:6px 0 0;">${c.codigo}</div>
      </div>`;
    }).join('');
  }catch{}
}
async function revocar(id){
  if(!confirm('¿Revocar esta credencial?')) return;
  const r=await fetch(`${API}/credenciales/${id}`,{method:'DELETE'}); const j=await r.json();
  toast(j.ok?'Credencial revocada':'Error'); cargar();
}
cargar();
</script>
</body>
</html>
