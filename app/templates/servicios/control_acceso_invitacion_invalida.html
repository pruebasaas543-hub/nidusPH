<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación no encontrada — Nidus</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(4, 34, 67, 0.12);
    max-width: 360px;
    width: 100%;
    padding: 2.5rem 1.75rem;
    text-align: center;
  }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h2 { color: #111827; font-size: 1.25rem; margin-bottom: .5rem; }
  p { color: #6b7280; font-size: .9rem; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h2>Invitación no encontrada</h2>
  <p>Este enlace no es válido, ya venció o fue revocado.<br>
     Solicita una nueva invitación al residente.</p>
</div>
</body>
</html>
