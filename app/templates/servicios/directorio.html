<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directorio de Contactos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080e2e;
      --bg2:     #0d1540;
      --bg3:     #111d52;
      --accent:  #00d4ff;
      --red:     #ff4d6d;
      --green:   #00e676;
      --yellow:  #ffd600;
      --purple:  #bf5af2;
      --text:    #e8eaf6;
      --muted:   rgba(232,234,246,.45);
      --border:  rgba(0,212,255,.18);
      --radius:  12px;
    }

    html, body { height:100%; overflow:hidden; font-family:'Outfit','Segoe UI',sans-serif; background:var(--bg); color:var(--text); }

    .page { display:flex; flex-direction:column; height:100%; overflow:hidden; }

    /* Topbar */
    .topbar { display:flex; align-items:center; gap:14px; padding:14px 24px; border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0; }
    .topbar a { color:var(--accent); text-decoration:none; font-size:.85rem; }
    .topbar a:hover { text-decoration:underline; }
    .topbar h1 { font-size:1.1rem; font-weight:600; }

    /* Toolbar */
    .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0; }
    .btn { border:none; border-radius:8px; padding:8px 18px; font-family:inherit; font-size:.85rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }

    /* Tabs */
    .tabs { display:flex; gap:4px; padding:12px 24px 0; border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
    .tab { padding:8px 16px; border-radius:8px 8px 0 0; cursor:pointer; font-size:.8rem; font-weight:600; border:1px solid transparent; border-bottom:none; color:var(--muted); background:transparent; white-space:nowrap; }
    .tab:hover { color:var(--text); }
    .tab.active { background:var(--bg3); color:var(--accent); border-color:var(--border); }

    /* Content */
    .content { flex:1; overflow-y:auto; padding:24px; }
    .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(272px,1fr)); gap:16px; }

    /* Contact card */
    .contact-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; flex-direction:column; gap:10px; transition:box-shadow .2s; }
    .contact-card:hover { box-shadow:0 4px 20px rgba(0,212,255,.1); }
    .card-header { display:flex; align-items:center; gap:12px; }
    .card-avatar { width:48px; height:48px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:1.4rem; background:var(--bg3); }
    .card-avatar img { width:100%; height:100%; object-fit:cover; }
    .card-name { font-weight:700; font-size:.94rem; }
    .card-role { font-size:.76rem; color:var(--muted); }
    .card-phones { font-size:.81rem; }
    .card-email { font-size:.77rem; color:var(--accent); }
    .card-flags { display:flex; flex-wrap:wrap; gap:5px; }
    .flag-chip { font-size:.67rem; padding:2px 8px; border-radius:99px; font-weight:600; }
    .flag-chip.on { background:rgba(0,230,118,.15); color:var(--green); }
    .flag-chip.off { background:rgba(232,234,246,.07); color:var(--muted); }
    .card-actions { display:flex; gap:8px; margin-top:2px; }
    .card-actions button { flex:1; border:none; border-radius:7px; padding:6px; font-family:inherit; font-size:.77rem; font-weight:600; cursor:pointer; }
    .edit-btn { background:var(--bg3); color:var(--accent); border:1px solid var(--border) !important; }
    .delete-btn { background:rgba(255,77,109,.12); color:var(--red); }
    .empty-state { text-align:center; color:var(--muted); padding:60px 0; font-size:.9rem; }

    /* Modal overlay */
    .modal-overlay { position:fixed; inset:0; background:rgba(8,14,46,.88); display:flex; align-items:center; justify-content:center; z-index:9999; opacity:0; visibility:hidden; transition:opacity .2s,visibility .2s; padding:16px; }
    .modal-overlay.show { opacity:1; visibility:visible; }

    /* Modal box */
    .modal-box { width:100%; max-width:560px; max-height:92vh; border-radius:18px; background:var(--bg2); border:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,.5); }

    /* Modal header */
    .modal-header { padding:18px 22px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .modal-header-icon { font-size:1.8rem; line-height:1; }
    .modal-header-info { flex:1; min-width:0; }
    .modal-header-title { font-size:.96rem; font-weight:700; color:#fff; }
    .modal-header-sub { font-size:.74rem; color:#fff; margin-top:2px; }
    .modal-close { background:rgba(255,255,255,.18); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; color:#fff; font-size:1.1rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* Modal body */
    .modal-body { padding:20px 22px; overflow-y:auto; flex:1; }

    /* Form */
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:.76rem; color:var(--muted); margin-bottom:5px; font-weight:600; letter-spacing:.3px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; background:var(--bg3); color:var(--text);
      border:1px solid var(--border); border-radius:8px;
      padding:9px 12px; font-family:inherit; font-size:.85rem;
    }
    .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,212,255,.12); }
    .form-group select option { background:var(--bg3); }

    /* Phone list */
    .phone-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
    .phone-row input { flex:1; }
    .phone-row button { background:rgba(255,77,109,.14); color:var(--red); border:none; border-radius:6px; padding:7px 10px; cursor:pointer; font-size:.85rem; }
    .add-phone-btn { background:transparent; color:var(--accent); border:1.5px dashed rgba(0,212,255,.4); border-radius:8px; padding:7px 14px; font-family:inherit; font-size:.78rem; cursor:pointer; width:100%; margin-top:2px; }
    .add-phone-btn:hover { background:rgba(0,212,255,.06); }

    /* Foto upload */
    .foto-area { border:2px dashed rgba(0,212,255,.25); border-radius:12px; padding:18px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; min-height:90px; }
    .foto-area:hover { border-color:rgba(0,212,255,.6); background:rgba(0,212,255,.04); }
    .foto-area img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
    .foto-area .foto-hint { font-size:.75rem; color:var(--muted); }

    /* Toggle switches */
    .toggle-section { border:1px solid var(--border); border-radius:12px; padding:16px; }
    .toggle-section-title { font-size:.68rem; font-weight:700; letter-spacing:.9px; color:var(--muted); margin-bottom:14px; }
    .toggle-label { display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; font-size:.83rem; margin-bottom:12px; }
    .toggle-label:last-child { margin-bottom:0; }
    .toggle-label input { position:absolute; opacity:0; width:0; height:0; }
    .toggle-track { width:38px; height:22px; border-radius:11px; background:rgba(232,234,246,.12); flex-shrink:0; position:relative; transition:background .2s; border:1px solid var(--border); }
    .toggle-track::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--muted); transition:transform .2s, background .2s; }
    .toggle-label input:checked ~ .toggle-track { background:var(--modal-accent, var(--accent)); border-color:var(--modal-accent, var(--accent)); }
    .toggle-label input:checked ~ .toggle-track::after { transform:translateX(16px); background:#fff; }

    /* Modal footer */
    .modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; flex-shrink:0; }
    .modal-footer .btn-save { padding:9px 22px; font-size:.88rem; border:none; border-radius:8px; font-family:inherit; font-weight:700; cursor:pointer; color:#fff; transition:opacity .2s; }
    .modal-footer .btn-save:hover { opacity:.85; }

    /* Dynamic fields */
    .dynamic-field { transition:opacity .15s; }

    /* Toast */
    #toast { position:fixed; bottom:24px; right:24px; background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:12px 20px; font-size:.85rem; z-index:99999; opacity:0; transform:translateY(12px); transition:opacity .3s,transform .3s; pointer-events:none; }
    #toast.show { opacity:1; transform:translateY(0); }
    #toast.err  { border-color:var(--red); color:var(--red); }
  </style>
</head>
<body>

<div class="page">

  <!-- Topbar -->
  <div class="topbar">
    <a href="{{ url_for('configuracion.panel') }}">&#8592; Volver</a>
    <span style="color:var(--muted);">|</span>
    <h1>&#128212; Directorio de Contactos</h1>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-nuevo" onclick="DC.abrirModal()">+ Nuevo Contacto</button>
    <div style="margin-left:auto;">
      <input id="buscador" type="text" placeholder="Buscar..." onInput="DC.filtrar(this.value)"
        style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:.83rem;width:200px;" />
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="bloques-tabs"></div>

  <!-- Content -->
  <div class="content">
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-dc">
  <div class="modal-box">

    <!-- Header -->
    <div class="modal-header" id="dc-modal-header" style="background:linear-gradient(135deg,#0a1a4a,#00d4ff);">
      <span class="modal-header-icon" id="dc-modal-icon">🚨</span>
      <div class="modal-header-info">
        <div class="modal-header-title" id="dc-modal-title">Nuevo Contacto</div>
        <div class="modal-header-sub" id="dc-modal-sub">Emergencias</div>
      </div>
      <button class="modal-close" onclick="DC.cerrarModal()">×</button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <input type="hidden" id="f-id" />

      <!-- Bloque -->
      <div class="form-group">
        <label>Bloque *</label>
        <select id="f-bloque" onchange="DC.cambioBloque()">
          <option value="EMERGENCIAS">🚨 Emergencias</option>
          <option value="ADMIN">🏢 Administración</option>
          <option value="PUBLICOS">💡 Servicios Públicos</option>
          <option value="LOGISTICA">🔧 Logística</option>
          <option value="LOCAL">📍 Locales</option>
        </select>
      </div>

      <!-- Nombre -->
      <div class="form-group">
        <label>Nombre *</label>
        <input id="f-nombre" type="text" placeholder="Nombre del contacto" />
      </div>

      <!-- Cargo (ADMIN / LOGISTICA) -->
      <div class="form-group dynamic-field dc-field-cargo" style="display:none;">
        <label>Cargo *</label>
        <input id="f-cargo" type="text" placeholder="Ej: Administrador, Técnico..." />
      </div>

      <!-- Correo (ADMIN / PUBLICOS) -->
      <div class="form-group dynamic-field dc-field-correo" style="display:none;">
        <label>Correo</label>
        <input id="f-correo" type="email" placeholder="correo@ejemplo.com" />
      </div>

      <!-- Teléfonos -->
      <div class="form-group">
        <label>Teléfonos * <span style="font-weight:400;font-size:.72rem;">(mín. 1)</span></label>
        <div id="phone-list"></div>
        <button class="add-phone-btn" onclick="DC.agregarTelefono()">+ Agregar teléfono</button>
      </div>

      <!-- Foto / Logo -->
      <div class="form-group">
        <label>Foto / Logo</label>
        <div class="foto-area" id="foto-area" onclick="document.getElementById('f-foto').click()">
          <img id="foto-preview" src="" alt="" style="display:none;" />
          <div id="foto-hint" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <span style="font-size:2rem;">📷</span>
            <span class="foto-hint">Haz clic para subir foto / logo</span>
          </div>
        </div>
        <input type="file" id="f-foto" accept="image/*" hidden onchange="DC.previewFoto(this)" />
      </div>

      <!-- Visibilidad y acceso -->
      <div class="toggle-section">
        <div class="toggle-section-title">VISIBILIDAD Y ACCESO</div>

        <label class="toggle-label">
          <input type="checkbox" id="f-visible" checked />
          <span class="toggle-track"></span>
          <span>Visible para residentes</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="f-seguridad" />
          <span class="toggle-track"></span>
          <span>Visible para seguridad</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="f-administracion" />
          <span class="toggle-track"></span>
          <span>Visible para administración</span>
        </label>
        <label class="toggle-label dynamic-field dc-field-panico" style="display:none;">
          <input type="checkbox" id="f-panico" />
          <span class="toggle-track"></span>
          <span style="color:var(--red);font-weight:600;">🆘 Botón de pánico</span>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-save" onclick="DC.cerrarModal()" style="background:linear-gradient(135deg,#7b0d1e,#e53e3e);color:#fff;">✕ Cancelar</button>
      <button class="btn-save" id="dc-btn-save" style="background:var(--accent);color:#000;" onclick="DC.guardar()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const DC = (() => {
  const BASE = '/servicios/directorio/contactos';

  const META = {
    EMERGENCIAS: { icon:'🚨', label:'Emergencias',        color:'#e53e3e', cargo:false, correo:false, panico:false },
    ADMIN:       { icon:'🏢', label:'Administración',     color:'#2b6cb0', cargo:true,  correo:true,  panico:true  },
    PUBLICOS:    { icon:'💡', label:'Servicios Públicos', color:'#276749', cargo:false, correo:true,  panico:false },
    LOGISTICA:   { icon:'🔧', label:'Logística',          color:'#b7791f', cargo:true,  correo:false, panico:true  },
    LOCAL:       { icon:'📍', label:'Locales',            color:'#6b46c1', cargo:false, correo:false, panico:false },
  };

  let _todos = [];
  let _bloqueActual = 'TODOS';
  let _busqueda = '';

  function toast(msg, esError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (esError ? ' err' : '');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 3200);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderTabs() {
    const cont = document.getElementById('bloques-tabs');
    cont.innerHTML = ['TODOS', ...Object.keys(META)].map(b => {
      const lbl = b === 'TODOS' ? '🌐 Todos' : (META[b].icon + ' ' + META[b].label);
      return `<div class="tab ${b === _bloqueActual ? 'active' : ''}" onclick="DC.setBloque('${b}')">${lbl}</div>`;
    }).join('');
  }

  function renderCards() {
    const grid = document.getElementById('cards-grid');
    let lista = _todos;
    if (_bloqueActual !== 'TODOS') lista = lista.filter(c => c.bloque === _bloqueActual);
    if (_busqueda) {
      const q = _busqueda.toLowerCase();
      lista = lista.filter(c =>
        (c.nombre||'').toLowerCase().includes(q) ||
        (c.cargo_titulo||'').toLowerCase().includes(q) ||
        (c.correo||'').toLowerCase().includes(q));
    }
    if (!lista.length) {
      grid.innerHTML = '<div class="empty-state">No hay contactos en este bloque.</div>';
      return;
    }
    grid.innerHTML = lista.map(c => {
      const m = META[c.bloque] || {};
      const tels = (c.telefonos||[]).map(t => typeof t==='string'?t:(t.numero||'')).filter(Boolean).join(', ');
      const avatar = c.tiene_foto
        ? `<img src="/servicios/directorio/contactos/${c._id}/foto" alt="" />`
        : (m.icon || '👤');
      const bloqueBadge = `<span style="font-size:.68rem;padding:2px 8px;border-radius:99px;background:${m.color}22;color:${m.color};font-weight:700;">${m.label||c.bloque}</span>`;
      return `
        <div class="contact-card">
          <div class="card-header">
            <div class="card-avatar">${avatar}</div>
            <div style="min-width:0;flex:1;">
              <div class="card-name">${esc(c.nombre)}</div>
              <div class="card-role">${c.cargo_titulo ? esc(c.cargo_titulo)+' · ' : ''}${bloqueBadge}</div>
            </div>
          </div>
          ${tels ? `<div class="card-phones">📞 ${esc(tels)}</div>` : ''}
          ${c.correo ? `<div class="card-email">✉️ ${esc(c.correo)}</div>` : ''}
          <div class="card-flags">
            ${flag(c.es_visible_para_residentes,    'Residentes')}
            ${flag(c.es_visible_para_seguridad,     'Seguridad')}
            ${flag(c.es_visible_para_administracion,'Administración')}
            ${c.vinculado_al_boton_de_panico ? '<span class="flag-chip" style="background:rgba(255,77,109,.18);color:var(--red);">🆘 Pánico</span>' : ''}
          </div>
          <div class="card-actions">
            <button class="edit-btn"   onclick="DC.editar('${c._id}')">Editar</button>
            <button class="delete-btn" onclick="DC.eliminar('${c._id}','${esc(c.nombre)}')">Eliminar</button>
          </div>
        </div>`;
    }).join('');
  }

  function flag(val, label) {
    const on = val === true || val === 'true' || val === 1;
    return `<span class="flag-chip ${on?'on':'off'}">${label}</span>`;
  }

  async function cargar() {
    try {
      const r = await fetch(BASE + '?solo_activos=0');
      const j = await r.json();
      if (j.ok) _todos = j.data || [];
      else toast(j.error || 'Error al cargar', true);
    } catch(e) { toast('Error de red', true); }
    renderTabs();
    renderCards();
  }

  function setBloque(b) { _bloqueActual = b; renderTabs(); renderCards(); }
  function filtrar(q)   { _busqueda = q; renderCards(); }

  /* ── Modal ── */
  function cambioBloque() {
    const b = document.getElementById('f-bloque').value;
    const m = META[b] || META.EMERGENCIAS;
    document.getElementById('dc-modal-icon').textContent = m.icon;
    document.getElementById('dc-modal-sub').textContent  = m.label;
    document.querySelectorAll('.dc-field-cargo').forEach(el  => el.style.display = m.cargo  ? '' : 'none');
    document.querySelectorAll('.dc-field-correo').forEach(el => el.style.display = m.correo ? '' : 'none');
    document.querySelectorAll('.dc-field-panico').forEach(el => el.style.display = m.panico ? '' : 'none');
  }

  function abrirModal(contacto = null) {
    const bloque = contacto ? contacto.bloque : (_bloqueActual !== 'TODOS' ? _bloqueActual : 'EMERGENCIAS');
    document.getElementById('f-id').value        = contacto ? contacto._id : '';
    document.getElementById('dc-modal-title').textContent = contacto ? 'Editar Contacto' : 'Nuevo Contacto';
    document.getElementById('f-bloque').value    = bloque;
    document.getElementById('f-nombre').value    = contacto ? (contacto.nombre||'') : '';
    document.getElementById('f-cargo').value     = contacto ? (contacto.cargo_titulo||'') : '';
    document.getElementById('f-correo').value    = contacto ? (contacto.correo||'') : '';
    document.getElementById('f-visible').checked       = contacto ? !!contacto.es_visible_para_residentes : true;
    document.getElementById('f-seguridad').checked     = contacto ? !!contacto.es_visible_para_seguridad : false;
    document.getElementById('f-administracion').checked= contacto ? !!contacto.es_visible_para_administracion : false;
    document.getElementById('f-panico').checked        = contacto ? !!contacto.vinculado_al_boton_de_panico : false;
    // Foto
    const prev = document.getElementById('foto-preview');
    const hint = document.getElementById('foto-hint');
    if (contacto && contacto.tiene_foto) {
      prev.src = `/servicios/directorio/contactos/${contacto._id}/foto`;
      prev.style.display = ''; hint.style.display = 'none';
    } else {
      prev.src = ''; prev.style.display = 'none'; hint.style.display = '';
    }
    document.getElementById('f-foto').value = '';
    // Teléfonos
    renderTelefonos(contacto ? (contacto.telefonos||[]) : ['']);
    cambioBloque();
    document.getElementById('modal-dc').classList.add('show');
  }

  function cerrarModal() { document.getElementById('modal-dc').classList.remove('show'); }

  function renderTelefonos(tels) {
    const list = document.getElementById('phone-list');
    list.innerHTML = '';
    tels.forEach(t => {
      const num = typeof t === 'string' ? t : (t.numero || '');
      _addPhoneRow(num, tels.length > 1);
    });
    if (!tels.length) _addPhoneRow('', false);
  }

  function _addPhoneRow(val, canDelete) {
    const list = document.getElementById('phone-list');
    const row = document.createElement('div');
    row.className = 'phone-row';
    row.innerHTML = `<input type="tel" placeholder="Ej: 311 234 5678" value="${esc(val)}" />` +
      (canDelete ? `<button onclick="this.closest('.phone-row').remove()">✕</button>` : '');
    list.appendChild(row);
  }

  function agregarTelefono() {
    const rows = document.querySelectorAll('#phone-list .phone-row');
    if (rows.length === 1) {
      rows[0].querySelector('button') || rows[0].insertAdjacentHTML('beforeend',
        '<button onclick="this.closest(\'.phone-row\').remove()">✕</button>');
    }
    _addPhoneRow('', true);
  }

  function previewFoto(input) {
    const prev = document.getElementById('foto-preview');
    const hint = document.getElementById('foto-hint');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { prev.src = e.target.result; prev.style.display = ''; hint.style.display = 'none'; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  async function guardar() {
    const id     = document.getElementById('f-id').value.trim();
    const bloque = document.getElementById('f-bloque').value;
    const nombre = document.getElementById('f-nombre').value.trim();
    const cargo  = document.getElementById('f-cargo').value.trim();
    const m = META[bloque] || {};
    const tels = [...document.querySelectorAll('#phone-list input[type="tel"]')]
      .map(i => i.value.trim()).filter(Boolean);
    if (!nombre)           { toast('El nombre es obligatorio', true); return; }
    if (m.cargo && !cargo) { toast('El cargo es obligatorio para este bloque', true); return; }
    if (!tels.length)      { toast('Debe ingresar al menos un teléfono', true); return; }

    const fd = new FormData();
    fd.append('bloque',  bloque);
    fd.append('nombre',  nombre);
    fd.append('cargo_titulo', cargo);
    fd.append('correo',       document.getElementById('f-correo').value.trim());
    fd.append('es_visible_para_residentes',   document.getElementById('f-visible').checked);
    fd.append('es_visible_para_seguridad',    document.getElementById('f-seguridad').checked);
    fd.append('es_visible_para_administracion', document.getElementById('f-administracion').checked);
    fd.append('vinculado_al_boton_de_panico', document.getElementById('f-panico').checked);
    fd.append('telefonos', JSON.stringify(tels.map(n => ({numero:n, etiqueta:''}))));
    const fotoInput = document.getElementById('f-foto');
    if (fotoInput.files[0]) fd.append('foto', fotoInput.files[0]);

    const url    = id ? `${BASE}/${id}` : BASE;
    const method = id ? 'PUT' : 'POST';
    try {
      const r = await fetch(url, {method, body:fd});
      const j = await r.json();
      if (j.ok) { toast(id ? 'Contacto actualizado' : 'Contacto creado'); cerrarModal(); cargar(); }
      else       { toast(j.error || 'Error al guardar', true); }
    } catch(e) { toast('Error de red', true); }
  }

  function editar(id) {
    const c = _todos.find(x => x._id === id);
    if (c) abrirModal(c);
  }

  async function eliminar(id, nombre) {
    if (!confirm(`¿Eliminar a "${nombre}"?`)) return;
    try {
      const r = await fetch(`${BASE}/${id}`, {method:'DELETE'});
      const j = await r.json();
      if (j.ok) { toast('Contacto eliminado'); cargar(); }
      else       { toast(j.error || 'Error', true); }
    } catch(e) { toast('Error de red', true); }
  }

  document.addEventListener('DOMContentLoaded', cargar);

  return { abrirModal, cerrarModal, cambioBloque, guardar, editar, eliminar, setBloque, filtrar, agregarTelefono, previewFoto };
})();
</script>
</body>
</html>
