<!DOCTYPE html>
<html lang="es" data-tema="{{ tema_clave }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪪 Control de Acceso — Administración</title>
<style id="nidus-tema">{{ tema_css | safe }}</style>
{% if tema_vars %}<style id="nidus-vars">{{ tema_vars | safe }}</style>{% endif %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit','Segoe UI',sans-serif;}
:root{
  --bg:#EEF2FF; --bg2:#FFFFFF; --bg3:#D8E4F5;
  --accent:#2787F5; --accent2:#1a6de0;
  --text:#1E2756; --muted:#8A9CC8; --border:rgba(39,135,245,.18);
  --red:#e53e3e; --green:#276749; --orange:#b7791f;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);}
.ca-wrap{max-width:1180px;margin:0 auto;padding:24px;}

/* Header: Volver + Empresa (estilo panel.html) */
.cfg-head{display:flex;align-items:center;gap:16px;padding-bottom:20px;border-bottom:1.5px solid rgba(4,34,67,.1);margin-bottom:24px;}
.cfg-volver{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid rgba(4,34,67,.22);border-radius:10px;
  padding:8px 16px;cursor:pointer;font-size:.82rem;color:#042243;font-weight:600;transition:all .2s;white-space:nowrap;text-decoration:none;}
.cfg-volver:hover{background:rgba(4,34,67,.06);}

/* Selector empresa (estilo exacto panel.html cfg-boton-panico) */
.cfg-empresa{background:rgba(4,34,67,.04);border:1.5px solid rgba(4,34,67,.1);border-radius:14px;padding:20px 24px;margin-bottom:24px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-left:auto;}
.cfg-empresa-lbl{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cfg-empresa-lbl .ic{font-size:1.4rem;}
.cfg-empresa-lbl .txt{display:flex;flex-direction:column;}
.cfg-empresa-lbl .t{font-size:.78rem;font-weight:700;color:#042243;letter-spacing:.3px;}
.cfg-empresa-lbl .s{font-size:.72rem;color:#8A9CC8;margin-top:1px;}
.cfg-empresa select{background:var(--bg2);border:1.5px solid rgba(4,34,67,.12);border-radius:10px;padding:9px 14px;
  font-size:.84rem;color:#042243;font-family:inherit;outline:none;cursor:pointer;min-width:280px;}
.cfg-empresa select:focus{border-color:var(--accent);}

/* Tabs */
.cfg-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;border-bottom:1.5px solid rgba(4,34,67,.08);padding-bottom:14px;}
.cfg-tab{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;cursor:pointer;font-size:.84rem;font-weight:700;
  font-family:inherit;border:1.5px solid transparent;color:var(--muted);background:none;transition:all .2s;}
.cfg-tab:hover{color:var(--text);background:rgba(4,34,67,.04);}
.cfg-tab.active{color:var(--tab-color,var(--accent));background:color-mix(in srgb,var(--tab-color,var(--accent)) 12%,transparent);
  border-color:color-mix(in srgb,var(--tab-color,var(--accent)) 35%,transparent);}
.cfg-badge{display:none;background:#e53e3e;color:#fff;border-radius:99px;font-size:.6rem;padding:1px 6px;font-weight:800;}
.cfg-badge.on{display:inline-block;animation:pulse .8s infinite;}
@keyframes pulse{50%{opacity:.4;}}

/* Contenido */
.cfg-frame-wrap{border:1.5px solid var(--border);border-radius:16px;overflow:hidden;background:var(--bg2);box-shadow:0 2px 12px rgba(0,0,0,.05);}
.cfg-frame-wrap iframe{width:100%;height:74vh;min-height:520px;border:none;display:block;}
.cfg-aviso{padding:70px 20px;text-align:center;color:var(--muted);font-size:.95rem;}
.hidden{display:none;}
@media(max-width:600px){.ca-wrap{padding:14px;}.cfg-empresa{flex-direction:column;align-items:stretch;margin-left:0;}.cfg-empresa select{min-width:auto;}}
</style>
</head>
<body>
<div class="ca-wrap">

  <!-- Header: Volver + Empresa -->
  {% if es_sistema %}
  <div class="cfg-head">
    <a class="cfg-volver" href="{{ url_for('auth.dashboard') }}"
       onclick="(window.top||window).location.href='{{ url_for('auth.dashboard') }}';return false;">
      &#8592; Volver a Inicio
    </a>
    <div class="cfg-empresa">
      <div class="cfg-empresa-lbl">
        <span class="ic">🏢</span>
        <div class="txt">
          <div class="t">Empresa / Propiedad</div>
          <div class="s">Selecciona para ver su configuración</div>
        </div>
      </div>
      <select id="conjuntoSel" onchange="seleccionarConjunto(this.value)">
        <option value="">— Selecciona una empresa —</option>
      </select>
    </div>
  </div>
  {% else %}
  <div class="cfg-head">
    <a class="cfg-volver" href="{{ url_for('auth.dashboard') }}"
       onclick="(window.top||window).location.href='{{ url_for('auth.dashboard') }}';return false;">
      &#8592; Volver a Inicio
    </a>
  </div>
  {% endif %}

  <!-- Tabs -->
  <div class="cfg-tabs">
    <button class="cfg-tab active" style="--tab-color:#e53e3e" data-tab="monitoreo" onclick="cambiar('monitoreo',this)">🛡️ Monitoreo <span class="cfg-badge" id="badgeCoaccion">!</span></button>
    <button class="cfg-tab" style="--tab-color:var(--accent)" data-tab="porteria" onclick="cambiar('porteria',this)">🚪 Portería</button>
    <button class="cfg-tab" style="--tab-color:var(--orange)" data-tab="credenciales" onclick="cambiar('credenciales',this)">🪪 Credenciales</button>
  </div>

  <!-- Contenido -->
  <div class="cfg-frame-wrap">
    {% if es_sistema %}
    <div id="aviso" class="cfg-aviso">👆 Selecciona una empresa arriba para comenzar.</div>
    {% endif %}
    <iframe id="f-monitoreo"    class="hidden"></iframe>
    <iframe id="f-porteria"     class="hidden"></iframe>
    <iframe id="f-credenciales" class="hidden"></iframe>
  </div>
</div>

<script>
const API='/servicios/control_acceso';
const ES_SISTEMA = {{ 'true' if es_sistema else 'false' }};
let EID='';
let tabActual='monitoreo';
const cargado={monitoreo:false,porteria:false,credenciales:false};

async function cargarConjuntos(){
  try{
    const r=await fetch(`${API}/conjuntos?_t=${Date.now()}`); const j=await r.json();
    const sel=document.getElementById('conjuntoSel'); if(!sel) return;
    (j.data||[]).forEach(e=>{ const o=document.createElement('option'); o.value=e._id; o.textContent=e.razon_social||e.nombre||e._id; sel.appendChild(o); });
  }catch{}
}
function seleccionarConjunto(eid){
  EID=eid;
  ['monitoreo','porteria','credenciales'].forEach(t=>{ cargado[t]=false; const f=document.getElementById('f-'+t); f.src='about:blank'; f.classList.add('hidden'); });
  const av=document.getElementById('aviso'); if(av) av.style.display = eid ? 'none' : 'block';
  if(eid) mostrarTab(tabActual);
}
function cambiar(tab, el){
  document.querySelectorAll('.cfg-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); tabActual=tab;
  if(EID) mostrarTab(tab);
  else { const av=document.getElementById('aviso'); if(av) av.style.display='block'; }
}
function mostrarTab(tab){
  const av=document.getElementById('aviso'); if(av) av.style.display='none';
  ['monitoreo','porteria','credenciales'].forEach(t=>{
    const f=document.getElementById('f-'+t);
    if(t===tab){
      if(!cargado[t]){
        const qs = EID ? `&empresa_id=${encodeURIComponent(EID)}` : '';
        f.src=`/servicios/control_acceso/?vista=${t}${qs}&embed=1`;
        cargado[t]=true;
      }
      f.classList.remove('hidden');
    } else f.classList.add('hidden');
  });
}
async function chequeoCoaccion(){
  const b=document.getElementById('badgeCoaccion');
  const qs = EID ? `empresa_id=${encodeURIComponent(EID)}&` : '';
  if(ES_SISTEMA && !EID){ if(b)b.className='cfg-badge'; return; }
  try{
    const r=await fetch(`${API}/coacciones-activas?${qs}_t=${Date.now()}`); const j=await r.json();
    if(b) b.className='cfg-badge'+((j.ok&&(j.data||[]).length>0)?' on':'');
  }catch{}
}

if(ES_SISTEMA){ cargarConjuntos(); }
else { mostrarTab('monitoreo'); }
chequeoCoaccion(); setInterval(chequeoCoaccion,5000);
</script>
</body>
</html>
