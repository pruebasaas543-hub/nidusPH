<!DOCTYPE html>
<html lang="es" data-tema="{{ tema_clave }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪪 Control de Acceso — Administración</title>
<style id="nidus-tema">{{ tema_css | safe }}</style>
{% if tema_vars %}<style id="nidus-vars">{{ tema_vars | safe }}</style>{% endif %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit','Segoe UI',sans-serif;}
:root{--bg:#EEF2FF;--bg2:#FFFFFF;--accent:#2787F5;--text:#1E2756;--muted:#8A9CC8;--border:rgba(39,135,245,.18);}
html,body{height:100%;}body{background:var(--bg);color:var(--text);}
.wrap{max-width:1100px;margin:0 auto;padding:16px;}
.top{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,#042243,#0a4a8c);color:#fff;border-radius:14px;padding:14px 20px;margin-bottom:14px;flex-wrap:wrap;}
.top .ic{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.conj-sel{margin-left:auto;min-width:240px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-family:inherit;font-size:.84rem;outline:none;cursor:pointer;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.tab{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:11px;cursor:pointer;font-size:.86rem;font-weight:700;border:1.5px solid var(--border);background:var(--bg2);color:var(--muted);transition:all .2s;}
.tab.active{background:color-mix(in srgb,var(--accent) 14%,transparent);border-color:var(--accent);color:var(--accent);}
.tab .badge{display:none;background:#e53e3e;color:#fff;border-radius:99px;font-size:.62rem;padding:1px 7px;font-weight:800;}
.tab .badge.on{display:inline-block;animation:pulse .8s infinite;}
@keyframes pulse{50%{opacity:.4;}}
.frame-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);min-height:400px;}
iframe{width:100%;height:760px;border:none;display:block;background:var(--bg);}
.hidden{display:none;}
.aviso{padding:50px 20px;text-align:center;color:var(--muted);font-size:.9rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="ic">🪪</div>
    <div>
      <div style="font-size:1.05rem;font-weight:800;">Control de Acceso — Administración</div>
      <div style="font-size:.74rem;opacity:.8;">Selecciona un conjunto para ver y configurar todo</div>
    </div>
    <select id="conjuntoSel" class="conj-sel" onchange="seleccionarConjunto(this.value)">
      <option value="">— Selecciona un conjunto —</option>
    </select>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="monitoreo" onclick="cambiar('monitoreo',this)">🛡️ Monitoreo <span class="badge" id="badgeCoaccion">!</span></div>
    <div class="tab" data-tab="porteria" onclick="cambiar('porteria',this)">🚪 Portería</div>
    <div class="tab" data-tab="credenciales" onclick="cambiar('credenciales',this)">🪪 Credenciales</div>
  </div>

  <div class="frame-wrap">
    <div id="aviso" class="aviso">👆 Selecciona un conjunto arriba para comenzar.</div>
    <iframe id="f-monitoreo"    class="hidden"></iframe>
    <iframe id="f-porteria"     class="hidden"></iframe>
    <iframe id="f-credenciales" class="hidden"></iframe>
  </div>
</div>

<script>
const API='/servicios/control_acceso';
let EID='';                 // conjunto seleccionado
let tabActual='monitoreo';
const cargado={monitoreo:false,porteria:false,credenciales:false};

async function cargarConjuntos(){
  try{
    const r=await fetch(`${API}/conjuntos?_t=${Date.now()}`); const j=await r.json();
    const sel=document.getElementById('conjuntoSel');
    (j.data||[]).forEach(e=>{
      const o=document.createElement('option'); o.value=e._id;
      o.textContent=e.razon_social||e.nombre||e._id; sel.appendChild(o);
    });
  }catch{}
}
function seleccionarConjunto(eid){
  EID=eid;
  // Resetear iframes para que recarguen con el nuevo conjunto
  ['monitoreo','porteria','credenciales'].forEach(t=>{ cargado[t]=false; document.getElementById('f-'+t).src='about:blank'; });
  document.getElementById('aviso').style.display = eid ? 'none' : 'block';
  if(eid) mostrarTab(tabActual);
}
function cambiar(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); tabActual=tab;
  if(EID) mostrarTab(tab);
}
function mostrarTab(tab){
  ['monitoreo','porteria','credenciales'].forEach(t=>{
    const f=document.getElementById('f-'+t);
    if(t===tab){
      if(!cargado[t]){ f.src=`/servicios/control_acceso/?vista=${t}&empresa_id=${encodeURIComponent(EID)}`; cargado[t]=true; }
      f.classList.remove('hidden');
    } else { f.classList.add('hidden'); }
  });
}
// Badge de coacción (avisa aunque estés en otra pestaña)
async function chequeoCoaccion(){
  if(!EID){ document.getElementById('badgeCoaccion').className='badge'; return; }
  try{
    const r=await fetch(`${API}/coacciones-activas?empresa_id=${encodeURIComponent(EID)}&_t=${Date.now()}`); const j=await r.json();
    const hay=j.ok&&(j.data||[]).length>0;
    document.getElementById('badgeCoaccion').className='badge'+(hay?' on':'');
  }catch{}
}
cargarConjuntos();
chequeoCoaccion(); setInterval(chequeoCoaccion,5000);
</script>
</body>
</html>
