<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar empresa — arIAna</title>
    <style>
    html { zoom: 0.8; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #0d1a5a 50%, #080e2e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px 16px;
            position: relative; overflow-x: hidden;
        }

        /* Fondo animado */
        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.35;
            pointer-events: none; animation: float 22s infinite ease-in-out;
        }
        .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, #00d4ff 0%, transparent 70%); top: -120px; left: -120px; }
        .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, #e600ff 0%, transparent 70%); bottom: -80px; right: -80px; animation-delay: 7s; }
        .orb3 { width: 300px; height: 300px; background: radial-gradient(circle, #00ff88 0%, transparent 70%); top: 50%; left: 55%; animation-delay: 14s; }
        @keyframes float {
            0%, 100% { transform: translate(0,0) scale(1); }
            33%       { transform: translate(35px,-35px) scale(1.06); }
            66%       { transform: translate(-25px,35px) scale(0.94); }
        }

        /* Contenedor principal */
        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 820px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 36px 36px;
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }

        .logo-wrap { text-align: center; margin-bottom: 28px; }
        .logo-wrap img { height: 52px; filter: drop-shadow(0 4px 16px rgba(0,212,255,.4)); }

        .greeting {
            text-align: center; margin-bottom: 10px;
            font-size: 1.05rem; color: rgba(255,255,255,.55); font-weight: 400;
        }
        .greeting strong { color: #00d4ff; font-weight: 700; }

        h1 {
            text-align: center; margin-bottom: 6px;
            font-size: 1.55rem; font-weight: 800; color: #fff;
            letter-spacing: .5px;
        }
        .subtitle {
            text-align: center; margin-bottom: 32px;
            font-size: .85rem; color: rgba(255,255,255,.4);
        }

        /* Grid de tarjetas */
        .empresas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .empresa-card {
            position: relative;
            background: rgba(255,255,255,.05);
            border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 14px;
            padding: 22px 20px 18px;
            cursor: pointer;
            transition: all .25s cubic-bezier(.4,0,.2,1);
            text-align: center;
        }
        .empresa-card:hover {
            background: rgba(0,212,255,.08);
            border-color: rgba(0,212,255,.45);
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0,212,255,.2);
        }
        .empresa-card.selected {
            background: rgba(0,212,255,.12);
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0,212,255,.25);
        }

        .empresa-icon {
            font-size: 2.2rem; margin-bottom: 12px; display: block;
            filter: drop-shadow(0 2px 8px rgba(0,212,255,.3));
        }
        .empresa-nombre {
            font-size: .95rem; font-weight: 700; color: #fff;
            margin-bottom: 8px; line-height: 1.3;
        }
        .empresa-rol {
            display: inline-block;
            font-size: .72rem; font-weight: 600;
            padding: 3px 10px; border-radius: 20px;
            background: rgba(0,212,255,.12);
            border: 1px solid rgba(0,212,255,.3);
            color: #00d4ff; letter-spacing: .3px;
        }

        /* Check overlay */
        .empresa-card .check {
            position: absolute; top: 10px; right: 12px;
            font-size: 1.1rem; opacity: 0; transition: opacity .2s;
        }
        .empresa-card.selected .check { opacity: 1; }

        /* Botón */
        .btn-continuar {
            width: 100%; padding: 14px;
            border: none; border-radius: 12px;
            background: linear-gradient(135deg, #00d4ff, #e600ff);
            color: #fff; font-weight: 800; font-size: 1rem;
            letter-spacing: 1.5px; text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 28px rgba(0,212,255,.4);
            transition: all .3s ease;
            position: relative; overflow: hidden;
        }
        .btn-continuar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,212,255,.55);
        }
        .btn-continuar:disabled {
            opacity: .45; cursor: not-allowed; transform: none;
        }
        .btn-continuar.loading::after {
            content: '';
            position: absolute; width: 18px; height: 18px;
            top: 50%; left: 50%; margin: -9px 0 0 -9px;
            border: 3px solid rgba(255,255,255,.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .logout-link {
            display: block; text-align: center; margin-top: 18px;
            font-size: .8rem; color: rgba(255,255,255,.35);
            text-decoration: none; transition: color .2s;
        }
        .logout-link:hover { color: rgba(255,255,255,.7); }
    </style>
</head>
<body>

    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <div class="card">
        <div class="logo-wrap">
            <img src="{{ url_for('static', filename='images/Logo-Caminos-1.png') }}" alt="arIAna">
        </div>

        <p class="greeting">Hola, <strong>{{ nombres }}</strong></p>
        <h1>¿En qué empresa trabajas hoy?</h1>
        <p class="subtitle">Selecciona el conjunto o empresa en el que deseas operar en esta sesión.</p>

        <form method="POST" action="{{ url_for('auth.confirmar_empresa') }}" id="form-empresa">
            <input type="hidden" name="empresa_id" id="empresa_id_sel" value="">

            <div class="empresas-grid">
                {% for op in opciones %}
                <div class="empresa-card" onclick="seleccionar('{{ op.empresa_id }}', this)">
                    <span class="check">✅</span>
                    <span class="empresa-icon">🏢</span>
                    <div class="empresa-nombre">{{ op.empresa_nombre or 'Empresa' }}</div>
                    <span class="empresa-rol">{{ op.rol_asignado }}</span>
                </div>
                {% endfor %}
            </div>

            <button type="submit" class="btn-continuar" id="btn-continuar" disabled>
                <span>Continuar</span>
            </button>
        </form>

        <a href="{{ url_for('auth.logout') }}" class="logout-link">← Cerrar sesión y volver al login</a>
    </div>

    <script>
        function seleccionar(empresaId, card) {
            document.querySelectorAll('.empresa-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            document.getElementById('empresa_id_sel').value = empresaId;
            document.getElementById('btn-continuar').disabled = false;
        }

        document.getElementById('form-empresa').addEventListener('submit', function() {
            const btn = document.getElementById('btn-continuar');
            btn.disabled = true;
            btn.querySelector('span').style.opacity = '0';
            btn.classList.add('loading');
        });
    </script>
</body>
</html>
